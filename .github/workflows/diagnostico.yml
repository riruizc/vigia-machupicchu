name: Diagnostico Machupicchu

on:
  workflow_dispatch:        # solo manual (botón "Run workflow")

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar Playwright + Chromium
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - name: Ejecutar diagnóstico
        run: node diagnostico.mjs
      - name: Guardar resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostico
          path: |
            diagnostico.txt
            step-*.png
            *.html
          if-no-files-found: ignore
          retention-days: 7
