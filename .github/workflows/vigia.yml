name: vigia
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  vigia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - run: node vigia.mjs
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

